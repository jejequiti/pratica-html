
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Página - Fontes, Mapa e Vídeo</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* Estilos Gerais */
        body {
            font-family: 'Roboto', sans-serif; /* Fonte do corpo */
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            background-color: #2c3e50;
            color: white;
            padding: 2rem;
            border-radius: 8px;
        }

        h1, h2 {
            font-family: 'Playfair Display', serif; /* Fonte dos títulos */
            color: #2c3e50;
        }

        header h1 { color: #fff; }

        section {
            background: white;
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Ajuste do Mapa e Vídeo para não estourarem a tela */
        .mapa-container iframe, 
        .video-container video {
            width: 100%;
            max-width: 800px;
            height: 450px;
            border: none;
            display: block;
            margin: 0 auto;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <h1>Minha Página Completa</h1>
        <p>Fontes, Mapa e Vídeo em HTML</p>
    </header>
    
    <main>
        <section>
            <h2>Sobre o Local</h2>
            <p>Este texto usa a fonte <strong>Roboto</strong>. Títulos usam <strong>Playfair Display</strong>.</p>
        </section>

        <section>
            <h2>Localização</h2>
            <div class="mapa-container">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3657.065830118312!2d-46.655273723755914!3d-23.5643110612192!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94ce59c8da0aa315%3A0xd59f9431f2c9776a!2sAv.%20Paulista%20-%20S%C3%A3o%20Paulo%2C%20SP!5e0!3m2!1spt-BR!2sbr!4v1700000000000" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </section>

        <section>
            <h2>Vídeo</h2>
            <div class="video-container">
                <video controls poster="imagens/capa.jpg">
                    <source src="video/meu-video.mp4" type="video/mp4">
                    Seu navegador não suporta o elemento de vídeo.
                </video>
            </div>
        </section>
    </main>

    <footer>
        <p>Aula de Frontend — Fontes, Mapa e Vídeo</p>
    </footer>

</body>
</html>
